site_name: "Python para Finanzas Cuantitativas"
site_description: "Curso completo de Python aplicado a finanzas cuantitativas. 43 unidades."
site_author: "Bortrax25"
site_url: "https://Bortrax25.github.io/python-finanzas-cuantitativas"
repo_url: "https://github.com/Bortrax25/python-finanzas-cuantitativas"
repo_name: "Bortrax25/python-finanzas-cuantitativas"

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Crimson Text
    code: Fira Code
  features:
    - navigation.instant
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: "#"
      toc_depth: 4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - es
        - en
  - glightbox
  - minify:
      minify_html: true

extra:
  generator: false

